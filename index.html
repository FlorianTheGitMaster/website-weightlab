<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeightLab – Vorträge</title>
<style>html,body{height:100%;margin:0;background:#f2efe9}</style>
</head>
<body>
<script>
/* Loader: content.json entscheidet, welche Website live ist (Admin-Page → "activeSite"). */
fetch('content.json?ts=' + Date.now(), { cache: 'no-store' })
  .then(r => (r.ok ? r.json() : {}))
  .catch(() => ({}))
  .then(c => {
    const file = c.activeSite === 'post' ? 'site-post.html' : 'site-pre.html';
    return fetch(file)
      .then(r => r.text())
      .then(html => { document.open(); document.write(html); document.close(); })
      .catch(() => location.replace(file));
  });
</script>
<noscript>Bitte JavaScript aktivieren — <a href="site-pre.html">zur Website</a>.</noscript>
</body>
</html>
